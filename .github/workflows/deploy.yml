name: Deploy

# Trigger Coolify deploy after CI finishes successfully on main.
# Secrets required:
#   - COOLIFY_TOKEN       Coolify API bearer token
#   - COOLIFY_DEPLOY_URL  Full deploy webhook URL (per-app UUID)
# Failed CI -> no deploy (broken commits stay off production).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Manual trigger for rare forced-deploy cases (infra-only env change,
  # recovery after a failed deploy, etc.) — run from GH Actions UI.
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    # Run when: (a) CI succeeded via workflow_run, OR (b) manual dispatch.
    # The workflow_run conclusion check is skipped for manual runs because
    # workflow_run context is absent then.
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    timeout-minutes: 5

    steps:
      - name: Call Coolify deploy webhook
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
        run: |
          response=$(curl -fsSL -H "Authorization: Bearer $COOLIFY_TOKEN" "$COOLIFY_DEPLOY_URL")
          echo "Coolify response: $response"
