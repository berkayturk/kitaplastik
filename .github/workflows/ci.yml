name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  # Manual escape hatch for forced pipeline runs (rare).
  workflow_dispatch:

# Cancel in-flight runs for the same ref when a new push/PR arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node 22 (pinned via .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Unit tests
        run: pnpm test
      - name: Security audit
        run: pnpm audit --audit-level=high --prod

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node 22 (pinned via .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'next.config.ts', 'tsconfig.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'next.config.ts', 'tsconfig.json') }}-
            ${{ runner.os }}-nextjs-
      - name: Build
        env:
          # Placeholder values so zod env validation passes during static build.
          # Real credentials are injected on Coolify at runtime.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SITE_URL: https://kitaplastik.com
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
          RESEND_API_KEY: re_placeholder_ci
          RESEND_FROM_EMAIL: noreply@kitaplastik.com
          RESEND_TEAM_EMAIL: info@kitaplastik.com
          NEXT_PUBLIC_SENTRY_DSN: ""
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ""
          NEXT_PUBLIC_PLAUSIBLE_HOST: ""
        run: pnpm build

  # Playwright E2E sharded across 3 parallel runners (shard is an integer,
  # safe from command-injection). Uses pnpm dev webServer (no build dep).
  e2e:
    name: e2e-shard-${{ matrix.shard }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node 22 (pinned via .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run E2E tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
          RESEND_API_KEY: re_placeholder_ci
          RESEND_FROM_EMAIL: noreply@kitaplastik.com
          RESEND_TEAM_EMAIL: info@kitaplastik.com
          NEXT_PUBLIC_SENTRY_DSN: ""
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ""
          NEXT_PUBLIC_PLAUSIBLE_HOST: ""
          SHARD: ${{ matrix.shard }}
        run: pnpm test:e2e --shard="$SHARD/3"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

  # Meta-gate for deploy workflow: succeeds only when all jobs above pass.
  # Deploy workflow waits on the CI workflow_run conclusion (any failed
  # job = workflow failure), so this job is just a human-readable marker.
  ci-success:
    name: ci-success
    needs: [quality, build, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Mark CI success
        run: echo "All CI jobs passed."
