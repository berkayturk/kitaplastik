name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push/PR arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-and-check:
    name: install + lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: Security audit
        run: pnpm audit --audit-level=high --prod
        continue-on-error: false

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          # Exact hit when deps + Next/TS config unchanged AND no source files changed;
          # otherwise fall through to restore-keys and Next handles incremental build.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'next.config.ts', 'tsconfig.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'next.config.ts', 'tsconfig.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        env:
          # Placeholder values so zod env validation passes during static build.
          # Real credentials are injected on Vercel at deploy time.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SITE_URL: https://kitaplastik.com
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
          RESEND_API_KEY: re_placeholder_ci
          RESEND_FROM_EMAIL: noreply@kitaplastik.com
          RESEND_TEAM_EMAIL: info@kitaplastik.com
          NEXT_PUBLIC_SENTRY_DSN: ""
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ""
          NEXT_PUBLIC_PLAUSIBLE_HOST: ""
        run: pnpm build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: install-and-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (with system deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm dlx playwright install --with-deps chromium

      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm dlx playwright install-deps chromium

      - name: Run E2E tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
          RESEND_API_KEY: re_placeholder_ci
          RESEND_FROM_EMAIL: noreply@kitaplastik.com
          RESEND_TEAM_EMAIL: info@kitaplastik.com
          NEXT_PUBLIC_SENTRY_DSN: ""
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ""
          NEXT_PUBLIC_PLAUSIBLE_HOST: ""
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
